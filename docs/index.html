<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LLM Feeds Snapshot</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f4f1eb;
        --surface: #f8f4ee;
        --surface-strong: #fcfaf6;
        --ink: #1f1a16;
        --muted: #645d55;
        --line: #d9cfbf;
        --line-strong: #c8baa4;
        --accent: #8b5a42;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--bg);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, avenir next, avenir,
          segoe ui, helvetica neue, helvetica, Cantarell, Ubuntu, roboto, noto,
          arial, sans-serif;
      }

      main {
        max-width: 40rem;
        padding: 28px;
        border-radius: 16px;
        background: var(--surface);
        border: 1px solid var(--line);
        text-align: center;
      }

      h1 {
        margin: 0;
        letter-spacing: -0.03em;
      }

      p {
        color: var(--muted);
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        min-height: 40px;
        align-items: center;
        justify-content: center;
        border-radius: 10px;
        padding: 0 14px;
        color: inherit;
        text-decoration: none;
        background: var(--surface-strong);
        border: 1px solid var(--line);
      }

      a:hover {
        background: rgba(255, 255, 255, 0.35);
        border-color: var(--line-strong);
      }
    </style>
    <meta http-equiv="refresh" content="0; url=./feeds/" />
  </head>
  <body>
    <main>
      <h1>LLM Feeds Snapshot</h1>
      <p>Redirecting to the static timeline preview.</p>
      <p><a href="./feeds/">Open the feed snapshot</a></p>
    </main>
    <script>
      const target = new URL("./feeds/", window.location.href);
      target.search = window.location.search;
      target.hash = window.location.hash;
      window.location.replace(target.toString());
    </script>
  </body>
</html>

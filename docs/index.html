<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LLM Feeds Snapshot</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f3efe6;
        --panel: #fffdf8;
        --ink: #1f1a16;
        --muted: #6f675f;
        --line: #d6cdbf;
        --accent: #9d5b3b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top left, rgba(157, 91, 59, 0.14), transparent 30%),
          linear-gradient(180deg, #f7f3ea 0%, var(--bg) 100%);
        color: var(--ink);
        font-family: "Georgia", "Times New Roman", serif;
      }

      main {
        max-width: 40rem;
        padding: 28px;
        border-radius: 24px;
        background: rgba(255, 253, 248, 0.92);
        border: 1px solid rgba(214, 205, 191, 0.9);
        text-align: center;
      }

      p {
        color: var(--muted);
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        min-height: 42px;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        padding: 0 16px;
        color: inherit;
        text-decoration: none;
        background: rgba(157, 91, 59, 0.12);
        border: 1px solid rgba(157, 91, 59, 0.24);
      }
    </style>
    <meta http-equiv="refresh" content="0; url=./feeds/" />
  </head>
  <body>
    <main>
      <h1>LLM Feeds Snapshot</h1>
      <p>Redirecting to the static timeline preview.</p>
      <p><a href="./feeds/">Open the feed snapshot</a></p>
    </main>
    <script>
      const target = new URL("./feeds/", window.location.href);
      target.search = window.location.search;
      target.hash = window.location.hash;
      window.location.replace(target.toString());
    </script>
  </body>
</html>
